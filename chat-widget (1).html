<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat · webAI Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ── RESET ───────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── TOKENS ──────────────────────────────── */
:root{
  --bg:#07080D;--bg2:#0F1120;--bg3:#181B2E;--bg4:#1F2340;
  --lime:#C8FF00;--mint:#00E5A0;--coral:#FF6B6B;
  --sky:#4FC3F7;--violet:#7C5CFC;--amber:#FFB347;
  --off:#F0F2FF;--muted:#7A7D95;--border:rgba(255,255,255,0.07);
  --fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;
}

/* ── LAYOUT ──────────────────────────────── */
html,body{height:100%;background:transparent;font-family:var(--fb);overflow:hidden}
.shell{
  width:100%;height:100%;
  display:flex;flex-direction:column;
  background:var(--bg2);
  border-radius:18px;
  border:1px solid var(--border);
  overflow:hidden;
  box-shadow:0 24px 64px rgba(0,0,0,.5);
}

/* ── HEADER ──────────────────────────────── */
.hdr{
  padding:.85rem 1.1rem;background:var(--bg3);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:.75rem;flex-shrink:0;
}
.av{
  width:38px;height:38px;border-radius:50%;
  background:var(--lime);display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;flex-shrink:0;
}
.hdr-txt h4{font-family:var(--fh);font-size:.88rem;font-weight:700;color:var(--off)}
.hdr-status{display:flex;align-items:center;gap:.35rem;font-size:.68rem;color:var(--mint);margin-top:.1rem}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--mint);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ── PROGRESS ────────────────────────────── */
.prog{
  padding:.5rem 1.1rem;background:var(--bg3);
  border-bottom:1px solid var(--border);flex-shrink:0;display:none;
}
.prog-row{display:flex;justify-content:space-between;font-size:.63rem;color:var(--muted);margin-bottom:.3rem}
.prog-track{height:3px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden}
.prog-fill{height:100%;background:var(--lime);border-radius:999px;transition:width .5s ease}

/* ── MESSAGES ────────────────────────────── */
.msgs{
  flex:1;overflow-y:auto;
  padding:.85rem 1rem;
  display:flex;flex-direction:column;gap:.75rem;
  scroll-behavior:smooth;
}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}

/* ── BUBBLES ─────────────────────────────── */
.msg{display:flex;flex-direction:column;max-width:84%}
.msg.bot{align-self:flex-start}
.msg.usr{align-self:flex-end}
.bub{padding:.6rem .85rem;border-radius:14px;font-size:.82rem;line-height:1.65}
.msg.bot .bub{background:var(--bg3);color:var(--off);border-bottom-left-radius:4px}
.msg.usr .bub{background:var(--lime);color:var(--bg);font-weight:500;border-bottom-right-radius:4px}
.ts{font-size:.6rem;color:var(--muted);margin-top:.2rem;padding:0 .25rem}
.msg.usr .ts{text-align:right}

/* ── TYPING ──────────────────────────────── */
.typ-wrap{align-self:flex-start}
.typ-bub{
  background:var(--bg3);border-radius:14px;border-bottom-left-radius:4px;
  padding:.6rem .85rem;display:flex;gap:.28rem;align-items:center;
}
.td{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:tdot 1.2s infinite}
.td:nth-child(2){animation-delay:.2s}
.td:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,80%,100%{transform:scale(.55)}40%{transform:scale(1)}}

/* ── OPTIONS ─────────────────────────────── */
.opts{
  padding:.5rem .9rem;display:flex;flex-wrap:wrap;gap:.4rem;
  border-top:1px solid var(--border);flex-shrink:0;
}
.opts:empty{padding:0;border-top:none}
.opt{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:999px;padding:.38rem .85rem;
  font-size:.76rem;color:var(--off);
  cursor:pointer;font-family:var(--fb);
  transition:background .18s,border-color .18s,color .18s;white-space:nowrap;
}
.opt:hover{background:var(--bg4);border-color:rgba(200,255,0,.4);color:var(--lime)}

/* ── INPUT ───────────────────────────────── */
.inp-row{padding:.7rem .9rem;border-top:1px solid var(--border);display:flex;gap:.55rem;flex-shrink:0}
.inp{
  flex:1;background:var(--bg3);border:1px solid var(--border);
  border-radius:999px;padding:.5rem .95rem;
  color:var(--off);font-size:.82rem;font-family:var(--fb);
  outline:none;transition:border-color .2s;
}
.inp:focus{border-color:rgba(200,255,0,.35)}
.inp::placeholder{color:var(--muted)}
.inp:disabled{opacity:.45}
.snd{
  width:34px;height:34px;border-radius:50%;
  background:var(--lime);color:var(--bg);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:.85rem;transition:transform .15s;flex-shrink:0;
}
.snd:hover{transform:scale(1.1)}
.snd:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* ── PLAN CARDS ──────────────────────────── */
.plans{display:flex;flex-direction:column;gap:.6rem;width:100%;margin:.2rem 0}
.pcard{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:14px;padding:.95rem;
  transition:border-color .2s,transform .2s;
}
.pcard:hover{transform:translateY(-1px)}
.pcard.rec{border-color:rgba(200,255,0,.35);background:rgba(200,255,0,.04)}
.pcard-badge{
  display:inline-block;background:var(--lime);color:var(--bg);
  font-size:.62rem;font-weight:700;border-radius:999px;
  padding:.18rem .6rem;margin-bottom:.55rem;
  text-transform:uppercase;letter-spacing:.04em;
}
.pcard-head{display:flex;align-items:center;gap:.65rem;margin-bottom:.35rem}
.pcard-emo{font-size:1.3rem}
.pcard-name{font-family:var(--fh);font-size:.88rem;font-weight:700}
.pcard-price{font-size:.75rem;font-weight:600;margin-top:.05rem}
.pcard-tag{font-size:.73rem;color:var(--muted);margin-bottom:.5rem;font-style:italic}
.pcard-feats{list-style:none;display:flex;flex-direction:column;gap:.18rem;margin-bottom:.65rem}
.pcard-feats li{font-size:.72rem;color:var(--muted)}
.pcard-feats li::before{content:'✓ ';color:var(--lime);font-weight:700}
.pcard-btns{display:flex;gap:.4rem}
.pcbtn{
  flex:1;padding:.45rem;border-radius:999px;
  font-size:.74rem;cursor:pointer;font-family:var(--fb);
  transition:opacity .15s;border:none;
}
.pcbtn.solid{background:var(--lime);color:var(--bg);font-weight:600}
.pcbtn.solid:hover{opacity:.88}
.pcbtn.ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.pcbtn.ghost:hover{border-color:rgba(200,255,0,.3);color:var(--lime)}
.pcbtn:disabled{opacity:.35;cursor:not-allowed}

/* ── FINISH ──────────────────────────────── */
.finish{
  margin:.5rem .9rem;
  background:rgba(200,255,0,.06);border:1px solid rgba(200,255,0,.2);
  border-radius:14px;padding:1rem;text-align:center;
  flex-shrink:0;display:none;
}
.finish-ic{font-size:1.8rem;margin-bottom:.4rem}
.finish h4{font-family:var(--fh);font-size:.88rem;font-weight:700;color:var(--lime);margin-bottom:.3rem}
.finish p{font-size:.75rem;color:var(--muted);line-height:1.6;margin-bottom:.8rem}
.wa-btn{
  background:#25D366;color:#fff;border:none;border-radius:999px;
  padding:.55rem 1.2rem;font-size:.8rem;font-weight:600;cursor:pointer;
  font-family:var(--fb);display:inline-flex;align-items:center;gap:.5rem;
  transition:opacity .15s;
}
.wa-btn:hover{opacity:.88}
</style>
</head>
<body>
<div class="shell">

  <!-- HEADER -->
  <div class="hdr">
    <div class="av">🤖</div>
    <div class="hdr-txt">
      <h4 id="botName">Asistente webAI</h4>
      <div class="hdr-status"><span class="sdot"></span>En línea · Asesor comercial</div>
    </div>
  </div>

  <!-- PROGRESS BAR -->
  <div class="prog" id="progBar">
    <div class="prog-row">
      <span id="pLabel">Paso 1</span>
      <span id="pPct">0%</span>
    </div>
    <div class="prog-track"><div class="prog-fill" id="pFill" style="width:0%"></div></div>
  </div>

  <!-- MESSAGES -->
  <div class="msgs" id="msgs"></div>

  <!-- OPTIONS -->
  <div class="opts" id="opts"></div>

  <!-- FINISH CARD -->
  <div class="finish" id="finishCard">
    <div class="finish-ic">🎉</div>
    <h4>¡Todo listo!</h4>
    <p id="finishMsg">Nuestro equipo revisará tu brief y te contactará muy pronto.</p>
    <button class="wa-btn" onclick="sendToWA()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      Enviar resumen por WhatsApp
    </button>
  </div>

  <!-- INPUT ROW -->
  <div class="inp-row">
    <input class="inp" id="inp" placeholder="Escribe tu respuesta..."
           onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();onInput(this.value)}">
    <button class="snd" id="sndBtn" onclick="onInput(document.getElementById('inp').value)">➤</button>
  </div>

</div><!-- /shell -->

<script>
// ════════════════════════════════════════════════════════════
//  STORAGE KEYS  (shared with admin.html)
// ════════════════════════════════════════════════════════════
const SK = 'webai_state';
const AK = 'webai_apikey';

// ════════════════════════════════════════════════════════════
//  PLAN DEFINITIONS
// ════════════════════════════════════════════════════════════
const PLANS = {

  lanzamiento: {
    key:'lanzamiento', name:'Plan Lanzamiento', emoji:'🚀',
    price:'$490.000', color:'#4FC3F7',
    tagline:'Tu primera presencia web profesional en 5 días',
    features:[

      'Diseño con tus colores y logo',

    ],
    qs:[

        t:'text' },

        t:'opts', o:['1 a 3','4 a 8','Más de 8'] },
      { k:'d_fotos',    q:'¿Tienes fotos o imágenes de tu negocio o productos?',
        t:'opts', o:['Sí, tengo buenas fotos','Tengo algunas, no muy buenas','No tengo fotos aún'] },
      { k:'d_cta',      q:'¿Cuál es la acción principal que quieres que haga el visitante?',
        t:'opts', o:['Contactarme por WhatsApp','Llenar un formulario','Agendar una cita','Conocer mi negocio'] },
      { k:'d_referencia',q:'¿Tienes alguna web de referencia que te guste? (pega el link o descríbela — escribe "ninguna" si no)',
        t:'text' }
    ]
  },

  crecimiento: {
    key:'crecimiento', name:'Plan Crecimiento', emoji:'📈',
    price:'$890.000', color:'#C8FF00',
    tagline:'Web completa para captar clientes y vender online',
    features:[
      'Hasta 5 páginas o secciones',
      'Pasarela de pagos integrada',
      'Galería de productos / portafolio',
      'SEO optimizado para Google',
      'Google Analytics + Pixel de Meta',
      '3 meses de soporte técnico'
    ],
    qs:[
      { k:'d_n_productos',q:'¿Cuántos productos o servicios tienes para publicar?',
        t:'opts', o:['Menos de 10','10 a 30','Más de 30'] },
      { k:'d_pasarela',  q:'¿Necesitas recibir pagos directamente desde la web?',
        t:'opts', o:['Sí, quiero cobrar online','No por ahora','No estoy seguro/a'] },
      { k:'d_seo',       q:'¿Qué tan importante es para ti aparecer en Google?',
        t:'opts', o:['Muy importante, es mi canal principal','Me interesa pero no es urgente','No lo necesito aún'] },
      { k:'d_pixel',     q:'¿Haces o planeas hacer publicidad en Facebook / Instagram?',
        t:'opts', o:['Sí, actualmente hago pauta','Planeo hacerlo pronto','No por ahora'] },
      { k:'d_testimonios',q:'¿Tienes testimonios o reseñas de clientes para mostrar?',
        t:'opts', o:['Sí, tengo varios','Tengo pocos','No tengo aún'] },
      { k:'d_referencia', q:'¿Hay alguna web que admires y que se parezca a lo que quieres?',
        t:'text' }
    ]
  },

  pro: {
    key:'pro', name:'Plan Pro + IA', emoji:'🤖',
    price:'$1.600.000', color:'#7C5CFC',
    tagline:'IA + automatización trabajando por tu negocio 24/7',
    features:[
      'Todo el Plan Crecimiento incluido',
      'Chatbot IA entrenado con tu negocio',
      'Automatización de leads y seguimiento',
      'Email marketing integrado',
      'Embudos de venta configurados',
      'Soporte prioritario por 6 meses'
    ],
    qs:[
      { k:'d_automatizar',q:'¿Qué procesos quieres automatizar primero?',
        t:'opts', o:['Atención al cliente 24/7','Captura y seguimiento de leads','Pedidos y pagos automáticos','Todos los anteriores'] },
      { k:'d_faq',        q:'¿Cuáles son las 3 preguntas más frecuentes que te hacen tus clientes? (escríbelas brevemente)',
        t:'text' },
      { k:'d_mensajes',   q:'¿Cuántos mensajes de clientes recibes al día aproximadamente?',
        t:'opts', o:['Menos de 10','Entre 10 y 50','Más de 50','Aún no lo sé'] },
      { k:'d_emails',     q:'¿Necesitas correos automáticos para tus clientes?',
        t:'opts', o:['Sí, es clave para mi negocio','Me interesa pero no sé por dónde empezar','No lo necesito aún'] },
      { k:'d_embudo',     q:'¿Tienes un proceso de seguimiento de ventas definido?',
        t:'opts', o:['Sí, lo tengo claro','Tengo algo pero necesito mejorarlo','No, necesito ayuda con eso'] },
      { k:'d_bot_tono',   q:'¿Cómo quieres que responda el chatbot de tu negocio?',
        t:'opts', o:['Formal y profesional','Amigable y cercano','Directo al punto','Que se adapte al cliente'] }
    ]
  }
};

// ════════════════════════════════════════════════════════════
//  DEFAULT DIAGNOSTIC FLOW  (Phase 1 — editable from admin)
// ════════════════════════════════════════════════════════════
const DEF_FLOW = [
  { id:1, key:'nombre',        question:'¿Cuál es tu nombre?',
    type:'text', options:[], isAlert:false },
  { id:2, key:'negocio',       question:'¿Cuál es el nombre de tu negocio?',
    type:'text', options:[], isAlert:false },
  { id:3, key:'descripcion',   question:'¿A qué se dedica tu negocio?',
    type:'text', options:[], isAlert:false },
  { id:4, key:'objetivo',      question:'¿Cuál es tu objetivo principal con la web?',
    type:'options', options:['Conseguir más clientes','Vender productos online','Mostrar mis servicios','Automatizar procesos'], isAlert:false },
  { id:5, key:'tiene_web',     question:'¿Tienes página web actualmente?',
    type:'options', options:['Sí, tengo web','No tengo web'], isAlert:false },
  { id:6, key:'vender_online', question:'¿Necesitas vender online?',
    type:'options', options:['Sí, necesito vender online','No por ahora'], isAlert:false },
  { id:7, key:'ia_interes',    question:'¿Te interesa incluir automatización o inteligencia artificial?',
    type:'options', options:['Sí, me interesa','No por ahora'], isAlert:false },
  { id:8, key:'whatsapp',      question:'¿Cuál es tu número de WhatsApp para contactarte?',
    type:'text', options:[], isAlert:false }
];

const DEF_SETTINGS = {
  botname:      'Asistente webAI',
  business:     'webAI Studio',
  welcome:      '¡Hola! 👋 Soy el asesor virtual de webAI Studio. Te haré unas preguntas rápidas para recomendarte la solución web ideal para tu negocio. ¿Empezamos?',
  systemprompt: 'Eres un asesor comercial amigable de webAI Studio, especializado en crear páginas web para negocios colombianos. Conoces los 3 planes: Lanzamiento ($490K), Crecimiento ($890K) y Pro+IA ($1.6M COP). Responde siempre en español, de forma concisa y orientada a resolver dudas comerciales.',
  alertwords:   'problema,queja,reclamo,no funciona,estafa,fraude,molesto,enojado,terrible,pésimo,malo,devolución,caro',
  whatsapp:     ''
};

// ════════════════════════════════════════════════════════════
//  RUNTIME STATE  — single source of truth
// ════════════════════════════════════════════════════════════
//  chatState values:
//    'welcome'  → greeting, waiting to start
//    'diag'     → Phase 1 diagnostic questions (from admin flow)
//    'rec'      → showing plan recommendation cards
//    'plan'     → Phase 4 plan-specific design questions
//    'open'     → free Q&A before starting flow
//    'done'     → all done, lead saved

let chatState = 'welcome';
let flow      = [];
let settings  = {};
let diagStep  = 0;      // current index in Phase 1
let planStep  = 0;      // current index in Phase 4
let chosen    = null;   // chosen plan key
let lead      = {};     // all collected data
let history   = [];     // Claude message history

// ════════════════════════════════════════════════════════════
//  STORAGE HELPERS
// ════════════════════════════════════════════════════════════
function loadSt()      { try { return JSON.parse(localStorage.getItem(SK)||'{}'); } catch(e){ return {}; } }
function saveSt(patch) { try { localStorage.setItem(SK,JSON.stringify({...loadSt(),...patch})); } catch(e){} }
function getKey()      { return localStorage.getItem(AK)||''; }

// ════════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════════
function init() {
  const s  = loadSt();
  flow     = (s.flow && s.flow.length) ? s.flow : JSON.parse(JSON.stringify(DEF_FLOW));
  settings = s.settings ? {...DEF_SETTINGS,...s.settings} : {...DEF_SETTINGS};

  document.getElementById('botName').textContent = settings.botname || 'Asistente webAI';

  chatState = 'welcome';
  diagStep  = 0;  planStep = 0;
  chosen    = null;
  lead      = { timestamp: new Date().toLocaleString('es-CO') };
  history   = [];

  document.getElementById('msgs').innerHTML  = '';
  document.getElementById('opts').innerHTML  = '';
  document.getElementById('finishCard').style.display = 'none';
  document.getElementById('progBar').style.display    = 'none';
  setInput(false);

  botMsg(settings.welcome);
  setTimeout(() => setOpts(['Sí, empecemos ✓', 'Tengo una pregunta primero']), 700);
}

// ════════════════════════════════════════════════════════════
//  ★ UNIFIED INPUT HANDLER — THE FIX ★
//  askClaude() is NEVER called from diag / plan states.
//  It is ONLY called from 'open' and 'done' states.
// ════════════════════════════════════════════════════════════
function onInput(raw) {
  const val = (raw || '').trim();
  if (!val) return;
  clearField();

  // ── STATE: welcome ────────────────────────────────────────
  if (chatState === 'welcome') {
    userMsg(val);
    setOpts([]);
    const wantsStart = val.includes('✓') || /empe[cz]|comen[cz]/i.test(val);
    if (wantsStart) {
      beginDiag();
    } else {
      chatState = 'open';
      setInput(true);
      botMsg('¡Claro! ¿Cuál es tu pregunta? Cuando quieras continuamos con el proceso.');
    }
    return;
  }

  // ── STATE: diag (Phase 1) ─────────────────────────────────
  //    → saves answer, advances to next question, NEVER calls askClaude
  if (chatState === 'diag') {
    userMsg(val);
    setOpts([]);
    checkAlert(val);
    const s = flow[diagStep];
    if (s) {
      lead[s.key || ('q' + diagStep)] = val;
      if (s.isAlert && val.length > 2) {
        fireAlert('"' + s.question + '": ' + val, {...lead});
      }
    }
    diagStep++;
    setInput(false);
    typing(true);
    setTimeout(() => { typing(false); advanceDiag(); }, 860);
    return;
  }

  // ── STATE: plan (Phase 4) ─────────────────────────────────
  //    → saves design answer, advances to next plan question, NEVER calls askClaude
  if (chatState === 'plan') {
    userMsg(val);
    setOpts([]);
    const p = PLANS[chosen];
    if (p && planStep < p.qs.length) {
      lead[p.qs[planStep].k] = val;
    }
    planStep++;
    setInput(false);
    typing(true);
    setTimeout(() => { typing(false); advancePlan(); }, 820);
    return;
  }

  // ── STATE: done — goodbye shortcut ────────────────────────
  if (chatState === 'done' && /gracias/i.test(val) && val.length < 30) {
    userMsg(val);
    setOpts([]);
    botMsg('¡De nada! 👋 Fue un placer asesorarte. Pronto nuestro equipo te contactará. ¡Mucho éxito!');
    setInput(false);
    return;
  }

  // ── STATE: open | done — Claude AI support ────────────────
  if (chatState === 'open' || chatState === 'done') {
    userMsg(val);
    setOpts([]);
    checkAlert(val);
    history.push({ role:'user', content:val });
    askClaude(val);
    return;
  }
}

// ════════════════════════════════════════════════════════════
//  PHASE 1 — DIAGNOSTIC FLOW
// ════════════════════════════════════════════════════════════
function beginDiag() {
  chatState = 'diag';
  diagStep  = 0;
  document.getElementById('progBar').style.display = 'block';
  updateProg(0, flow.length);
  setTimeout(askDiagQ, 480);
}

function askDiagQ() {
  if (diagStep >= flow.length) { buildRec(); return; }
  const s = flow[diagStep];
  updateProg(diagStep, flow.length);
  typing(true);
  setTimeout(() => {
    typing(false);
    botMsg(s.question);
    if (s.type === 'options' && s.options && s.options.length) {
      setOpts(s.options);
      setInput(false);
    } else {
      setOpts([]);
      setInput(true);
    }
  }, 500);
}

function advanceDiag() {
  if (diagStep < flow.length) askDiagQ();
  else buildRec();
}

// ════════════════════════════════════════════════════════════
//  PHASE 2 — RECOMMENDATION ENGINE
// ════════════════════════════════════════════════════════════
function buildRec() {
  chatState = 'rec';
  setInput(false);
  setOpts([]);
  document.getElementById('progBar').style.display = 'none';

  const recKey = calcPlan();
  const name   = (lead.nombre || '').split(' ')[0];

  botMsg((name ? name + ', ¡' : '¡') + 'gracias por tu tiempo! 🎯 Analicé tus respuestas y encontré el plan ideal para tu negocio.');

  setTimeout(() => {
    typing(true);
    setTimeout(() => { typing(false); renderPlanCards(recKey); }, 1100);
  }, 400);
}

function calcPlan() {
  const obj  = (lead.objetivo    || '').toLowerCase();
  const ia   = (lead.ia_interes  || '').toLowerCase();
  const sell = (lead.vender_online || '').toLowerCase();

  if (ia.includes('sí') || obj.includes('automatizar'))             return 'pro';
  if (sell.includes('sí') || obj.includes('vender') || obj.includes('clientes')) return 'crecimiento';
  return 'lanzamiento';
}

function renderPlanCards(recKey) {
  const order = [recKey, ...Object.keys(PLANS).filter(k => k !== recKey)];
  const wrap  = document.createElement('div');
  wrap.className = 'plans';

  order.forEach(key => {
    const p    = PLANS[key];
    const isR  = key === recKey;
    const card = document.createElement('div');
    card.className = 'pcard' + (isR ? ' rec' : '');

    card.innerHTML =
      (isR ? '<div class="pcard-badge">⭐ Recomendado para ti</div>' : '') +
      '<div class="pcard-head">' +
        '<span class="pcard-emo">' + p.emoji + '</span>' +
        '<div>' +
          '<div class="pcard-name">' + p.name + '</div>' +
          '<div class="pcard-price" style="color:' + p.color + '">' + p.price + ' COP</div>' +
        '</div>' +
      '</div>' +
      '<div class="pcard-tag">' + p.tagline + '</div>' +
      '<ul class="pcard-feats">' + p.features.map(f => '<li>' + f + '</li>').join('') + '</ul>' +
      '<div class="pcard-btns">' +
        '<button class="pcbtn solid" onclick="choosePlan(\'' + key + '\')">' +
          (isR ? '✓ Elegir este plan' : 'Elegir este plan') +
        '</button>' +
      '</div>';

    wrap.appendChild(card);
  });

  appendEl(wrap);
  setTimeout(() => botMsg('¿Cuál plan se ajusta mejor a lo que necesitas?'), 300);
}

// ════════════════════════════════════════════════════════════
//  PHASE 3 — PLAN SELECTION (called from card button)
// ════════════════════════════════════════════════════════════
function choosePlan(key) {
  document.querySelectorAll('.pcbtn').forEach(b => b.disabled = true);

  const p      = PLANS[key];
  lead.paquete = p.name;
  lead.precio  = p.price + ' COP';
  chosen       = key;
  planStep     = 0;
  chatState    = 'plan';

  userMsg('Elijo el ' + p.name + ' ' + p.emoji);
  botMsg('¡Excelente elección! ' + p.emoji + ' Ahora necesito algunos datos de diseño para crear tu web personalizada. Son pocas preguntas rápidas, te lo prometo.');

  const total = flow.length + p.qs.length;
  document.getElementById('progBar').style.display = 'block';
  updateProg(flow.length, total);

  setTimeout(askPlanQ, 950);
}

// ════════════════════════════════════════════════════════════
//  PHASE 4 — PLAN-SPECIFIC DESIGN QUESTIONS
// ════════════════════════════════════════════════════════════
function askPlanQ() {
  const p = PLANS[chosen];
  if (!p || planStep >= p.qs.length) { finish(); return; }

  const q     = p.qs[planStep];
  const total = flow.length + p.qs.length;
  updateProg(flow.length + planStep, total);

  typing(true);
  setTimeout(() => {
    typing(false);
    botMsg(q.q);
    if (q.t === 'opts') {
      setOpts(q.o);
      setInput(false);
    } else {
      setOpts([]);
      setInput(true);
    }
  }, 600);
}

function advancePlan() {
  const p = PLANS[chosen];
  if (p && planStep < p.qs.length) askPlanQ();
  else finish();
}

// ════════════════════════════════════════════════════════════
//  PHASE 5 — FINISH & WHATSAPP
// ════════════════════════════════════════════════════════════
function finish() {
  chatState = 'done';
  setInput(false);
  setOpts([]);
  updateProg(9999, 9999);

  saveLead({...lead});

  const p    = chosen ? PLANS[chosen] : null;
  const name = (lead.nombre || '').split(' ')[0];

  botMsg(
    (name ? '¡' + name + ', todo' : '¡Todo') + ' listo! 🎉 ' +
    'Tenemos toda la información para diseñar tu ' +
    (p ? p.name + ' ' + p.emoji : 'web') + '. ' +
    'Nuestro equipo te contactará pronto' +
    (lead.whatsapp ? ' al ' + lead.whatsapp : '') + '.'
  );

  document.getElementById('finishCard').style.display = 'block';

  setTimeout(() => {
    setOpts(['¿Cuándo empiezan?', '¿Cómo se paga?', '¿Qué incluye exactamente?', 'Ya está, gracias 👋']);
  }, 1200);
}

// ─── Build & send WhatsApp message ───────────────────────────
function sendToWA() {
  const num = (settings.whatsapp || '').replace(/\D/g, '');
  const msg = buildWAMsg();
  window.open('https://wa.me/' + num + '?text=' + encodeURIComponent(msg), '_blank');
}

function buildWAMsg() {
  const sep = '─────────────────────';
  const lines = ['*webAI Studio — Nuevo Lead* 🚀', sep, ''];

  const map = [
    ['timestamp',    '⏰ Fecha'],
    ['nombre',       '👤 Nombre'],
    ['negocio',      '🏪 Negocio'],
    ['descripcion',  '📋 A qué se dedica'],
    ['objetivo',     '🎯 Objetivo web'],
    ['tiene_web',    '🌐 Web actual'],
    ['vender_online','🛍 Vender online'],
    ['ia_interes',   '🤖 Interés en IA'],
    ['whatsapp',     '📱 WhatsApp'],
    ['paquete',      '💡 Plan elegido'],
    ['precio',       '💰 Inversión']
  ];

  map.forEach(([k, lbl]) => { if (lead[k]) lines.push(lbl + ': ' + lead[k]); });

  const extras = Object.entries(lead).filter(([k]) => k.startsWith('d_'));
  if (extras.length) {
    lines.push('', sep);
    lines.push('*Brief de diseño:*');
    extras.forEach(([k, v]) => {
      const lbl = k.replace('d_','').replace(/_/g,' ');
      lines.push('• ' + lbl.charAt(0).toUpperCase() + lbl.slice(1) + ': ' + v);
    });
  }

  lines.push('', sep);
  return lines.join('\n');
}

// ════════════════════════════════════════════════════════════
//  CLAUDE AI — Only called in 'open' and 'done' states
// ════════════════════════════════════════════════════════════
const FALLBACKS = {
  'precio':   'Tenemos 3 planes: 🚀 Lanzamiento ($490K), 📈 Crecimiento ($890K) y 🤖 Pro+IA ($1.6M). Todos incluyen diseño personalizado, dominio y hosting. ¿Te explico alguno?',
  'tarda':    'La mayoría de webs las entregamos en 3 a 5 días hábiles desde que tenemos toda la información.',
  'tiempo':   'La mayoría de webs las entregamos en 3 a 5 días hábiles desde que tenemos toda la información.',
  'pago':     'El pago es 50% al inicio y 50% contra entrega. Aceptamos transferencia, Nequi, Bancolombia y tarjeta.',
  'incluye':  'Todos los planes incluyen diseño personalizado, móvil + escritorio, WhatsApp y formulario. Los planes superiores añaden tienda, SEO, chatbot IA y más.',
  'proceso':  '1) Confirmás el plan. 2) Nos enviás los datos y colores. 3) En 3-5 días te mostramos la web. 4) Ajustamos si es necesario. 5) ¡Publicamos!',
  'garantía': 'Ofrecemos soporte post-entrega: 1 mes en el plan Lanzamiento y hasta 6 meses en el plan Pro+IA.',
  'pagan':    'El pago es 50% al inicio y 50% contra entrega. Aceptamos transferencia, Nequi y tarjeta.'
};

function askClaude(msg) {
  const key = getKey();
  typing(true);

  if (!key || !key.startsWith('sk-ant')) {
    // Smart keyword fallback (no API key needed)
    const hit = Object.keys(FALLBACKS).find(k => msg.toLowerCase().includes(k));
    setTimeout(() => {
      typing(false);
      const reply = hit ? FALLBACKS[hit] : 'Gracias por tu pregunta. Un asesor del equipo te responderá con detalle muy pronto.';
      botMsg(reply);
      history.push({ role:'assistant', content:reply });
    }, 800);
    return;
  }

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 300,
      system: settings.systemprompt || DEF_SETTINGS.systemprompt,
      messages: history.slice(-8)
    })
  })
  .then(r => r.json())
  .then(d => {
    typing(false);
    const reply = d?.content?.[0]?.text || '¿Puedes reformular tu pregunta? Quiero ayudarte mejor.';
    botMsg(reply);
    history.push({ role:'assistant', content:reply });
  })
  .catch(() => {
    typing(false);
    botMsg('Hubo un problema de conexión. Por favor intenta de nuevo en un momento.');
  });
}

// ════════════════════════════════════════════════════════════
//  ALERTS
// ════════════════════════════════════════════════════════════
function checkAlert(text) {
  const words = (settings.alertwords || DEF_SETTINGS.alertwords)
    .split(',').map(w => w.trim().toLowerCase()).filter(Boolean);
  const hit = words.find(w => text.toLowerCase().includes(w));
  if (hit) fireAlert('Palabra clave "' + hit + '" → "' + text.substring(0, 80) + '"', {...lead});
}

function fireAlert(reason, snap) {
  const s = loadSt();
  const a = s.alerts || [];
  a.unshift({ id:Date.now(), reason, lead:snap, time:new Date().toLocaleString('es-CO'), read:false });
  saveSt({ alerts:a });
}

// ════════════════════════════════════════════════════════════
//  LEAD SAVE
// ════════════════════════════════════════════════════════════
function saveLead(l) {
  const s     = loadSt();
  const leads = s.leads  || [];
  const convs = s.conversations || [];
  const entry = {...l, id:Date.now()};
  leads.unshift(entry);
  convs.unshift(entry);
  saveSt({ leads, conversations:convs });
}

// ════════════════════════════════════════════════════════════
//  UI HELPERS
// ════════════════════════════════════════════════════════════
function botMsg(html) {
  const d = document.createElement('div');
  d.className = 'msg bot';
  d.innerHTML = '<div class="bub">' + html + '</div><div class="ts">' + now() + '</div>';
  appendEl(d);
}
function userMsg(text) {
  const d = document.createElement('div');
  d.className = 'msg usr';
  d.innerHTML = '<div class="bub">' + esc(text) + '</div><div class="ts">' + now() + '</div>';
  appendEl(d);
}
function appendEl(el) {
  const m = document.getElementById('msgs');
  m.appendChild(el);
  m.scrollTop = m.scrollHeight;
}
function typing(show) {
  const id = 'tyEl';
  if (show) {
    if (document.getElementById(id)) return;
    const d = document.createElement('div');
    d.className = 'typ-wrap'; d.id = id;
    d.innerHTML = '<div class="typ-bub"><div class="td"></div><div class="td"></div><div class="td"></div></div>';
    appendEl(d);
  } else {
    const e = document.getElementById(id);
    if (e) e.remove();
  }
}
function setOpts(opts) {
  const c = document.getElementById('opts');
  c.innerHTML = '';
  opts.forEach(o => {
    const b = document.createElement('button');
    b.className = 'opt'; b.textContent = o;
    b.onclick = function() { onInput(this.textContent); };
    c.appendChild(b);
  });
}
function setInput(enabled) {
  const i = document.getElementById('inp');
  const b = document.getElementById('sndBtn');
  i.disabled    = !enabled;
  b.disabled    = !enabled;
  i.placeholder = enabled ? 'Escribe tu respuesta...' : 'Selecciona una opción ↑';
}
function clearField()  { document.getElementById('inp').value = ''; }
function updateProg(step, total) {
  const done = step >= total;
  const pct  = done ? 100 : (total > 0 ? Math.min(Math.round(step / total * 100), 99) : 0);
  document.getElementById('pFill').style.width  = pct + '%';
  document.getElementById('pLabel').textContent = done ? '¡Completado! 🎉' : 'Paso ' + (step + 1) + ' de ' + total;
  document.getElementById('pPct').textContent   = pct + '%';
}
function now()  { return new Date().toLocaleTimeString('es-CO', {hour:'2-digit', minute:'2-digit'}); }
function esc(s) { return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ════════════════════════════════════════════════════════════
//  LIVE SYNC — picks up admin changes when chat is in welcome
// ════════════════════════════════════════════════════════════
window.addEventListener('storage', e => {
  if (e.key === SK && chatState === 'welcome') {
    try {
      const ns = JSON.parse(e.newValue || '{}');
      if (ns.flow)     { flow     = ns.flow; }
      if (ns.settings) { settings = {...DEF_SETTINGS,...ns.settings}; document.getElementById('botName').textContent = settings.botname || 'Asistente webAI'; }
    } catch(err) {}
  }
});

// ════════════════════════════════════════════════════════════
//  START
// ════════════════════════════════════════════════════════════
init();
</script>
