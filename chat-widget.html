<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat · webAI Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080D;--bg2:#0F1120;--bg3:#181B2E;--bg4:#1F2340;
  --lime:#C8FF00;--mint:#00E5A0;--coral:#FF6B6B;--muted:#7A7D95;
  --off:#F0F2FF;--border:rgba(255,255,255,0.07);
  --fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;
}
html,body{height:100%;background:transparent;font-family:var(--fb);overflow:hidden}

/* ── SHELL ── */
.chat-shell{
  width:100%;height:100%;
  display:flex;flex-direction:column;
  background:var(--bg2);
  border-radius:18px;
  border:1px solid var(--border);
  overflow:hidden;
  box-shadow:0 24px 64px rgba(0,0,0,.5);
}

/* ── HEADER ── */
.chat-header{
  padding:.85rem 1.1rem;
  background:var(--bg3);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:.75rem;
  flex-shrink:0;
}
.bot-av{
  width:38px;height:38px;border-radius:50%;
  background:var(--lime);
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;flex-shrink:0;
}
.bot-info h4{font-family:var(--fh);font-size:.88rem;font-weight:700;color:var(--off)}
.bot-status{display:flex;align-items:center;gap:.35rem;font-size:.68rem;color:var(--mint);margin-top:.1rem}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--mint);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}

/* progress bar */
.progress-wrap{padding:.5rem 1.1rem;background:var(--bg3);border-bottom:1px solid var(--border);flex-shrink:0}
.progress-label{display:flex;justify-content:space-between;font-size:.65rem;color:var(--muted);margin-bottom:.35rem}
.progress-track{height:3px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden}
.progress-fill{height:100%;background:var(--lime);border-radius:999px;transition:width .5s ease}

/* ── MESSAGES ── */
.chat-messages{
  flex:1;overflow-y:auto;
  padding:.85rem 1rem;
  display:flex;flex-direction:column;
  gap:.75rem;
  scroll-behavior:smooth;
}
.chat-messages::-webkit-scrollbar{width:3px}
.chat-messages::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}

.msg{display:flex;flex-direction:column;max-width:82%}
.msg.bot{align-self:flex-start}
.msg.user{align-self:flex-end}
.msg-bubble{
  padding:.6rem .85rem;
  border-radius:14px;
  font-size:.82rem;
  line-height:1.6;
}
.msg.bot  .msg-bubble{background:var(--bg3);color:var(--off);border-bottom-left-radius:4px}
.msg.user .msg-bubble{background:var(--lime);color:var(--bg);font-weight:500;border-bottom-right-radius:4px}
.msg-time{font-size:.6rem;color:var(--muted);margin-top:.2rem;padding:0 .25rem}
.msg.user .msg-time{text-align:right}

/* typing */
.typing-wrap{align-self:flex-start}
.typing-bubble{
  background:var(--bg3);border-radius:14px;border-bottom-left-radius:4px;
  padding:.6rem .85rem;
  display:flex;gap:.3rem;align-items:center;
}
.td{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:tdot 1.2s infinite}
.td:nth-child(2){animation-delay:.2s}
.td:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,80%,100%{transform:scale(.55)}40%{transform:scale(1)}}

/* ── OPTIONS ── */
.chat-options{
  padding:.5rem .9rem;
  display:flex;flex-wrap:wrap;gap:.4rem;
  border-top:1px solid var(--border);
  flex-shrink:0;
  min-height:0;
}
.chat-options:empty{padding:0;border-top:none}
.opt-btn{
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:999px;
  padding:.38rem .85rem;
  font-size:.76rem;color:var(--off);
  cursor:pointer;font-family:var(--fb);
  transition:background .18s,border-color .18s,color .18s;
  white-space:nowrap;
}
.opt-btn:hover{background:var(--bg4);border-color:rgba(200,255,0,.35);color:var(--lime)}

/* ── INPUT ── */
.chat-input-row{
  padding:.7rem .9rem;
  border-top:1px solid var(--border);
  display:flex;gap:.55rem;
  flex-shrink:0;
}
.chat-input{
  flex:1;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:999px;
  padding:.5rem .95rem;
  color:var(--off);
  font-size:.82rem;font-family:var(--fb);
  outline:none;
  transition:border-color .2s;
}
.chat-input:focus{border-color:rgba(200,255,0,.35)}
.chat-input::placeholder{color:var(--muted)}
.send-btn{
  width:34px;height:34px;border-radius:50%;
  background:var(--lime);color:var(--bg);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:.85rem;transition:transform .15s;flex-shrink:0;
}
.send-btn:hover{transform:scale(1.1)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* ── FINISH CARD ── */
.finish-card{
  margin:.5rem;
  background:rgba(200,255,0,.06);
  border:1px solid rgba(200,255,0,.2);
  border-radius:14px;
  padding:1rem;
  text-align:center;
  font-size:.8rem;
  color:var(--off);
  flex-shrink:0;
  display:none;
}
.finish-card .fc-icon{font-size:1.8rem;margin-bottom:.4rem}
.finish-card h4{font-family:var(--fh);font-size:.9rem;font-weight:700;color:var(--lime);margin-bottom:.3rem}
</style>
</head>
<body>

<div class="chat-shell">

  <!-- HEADER -->
  <div class="chat-header">
    <div class="bot-av">🤖</div>
    <div class="bot-info">
      <h4 id="botNameHeader">Asistente webAI</h4>
      <div class="bot-status"><span class="status-dot"></span>En línea · Con IA</div>
    </div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-wrap" id="progressWrap" style="display:none">
    <div class="progress-label">
      <span id="progressLabel">Pregunta 1</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <!-- MESSAGES -->
  <div class="chat-messages" id="chatMessages"></div>

  <!-- OPTIONS -->
  <div class="chat-options" id="chatOptions"></div>

  <!-- FINISH CARD -->
  <div class="finish-card" id="finishCard">
    <div class="fc-icon">🎉</div>
    <h4>¡Listo! Ya te tenemos en el radar</h4>
    <p style="color:var(--muted);font-size:.75rem;line-height:1.6">Nuestro equipo revisará tu información y te contactará pronto.</p>
  </div>

  <!-- INPUT -->
  <div class="chat-input-row">
    <input class="chat-input" id="chatInput" placeholder="Escribe tu respuesta..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}">
    <button class="send-btn" id="sendBtn" onclick="sendMsg()">➤</button>
  </div>

</div>

<script>
/* ════════════════════════════════
   SHARED STORAGE KEY (same as admin)
════════════════════════════════ */
const STORAGE_KEY = 'webai_state';
const API_KEY_KEY = 'webai_apikey';

/* ════════════════════════════════
   LOAD CONFIG FROM STORAGE
════════════════════════════════ */
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}
function saveState(patch) {
  const current = loadState();
  const merged = { ...current, ...patch };
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(merged)); } catch(e){}
}
function getApiKey() {
  return localStorage.getItem(API_KEY_KEY) || '';
}

/* ════════════════════════════════
   DEFAULTS
════════════════════════════════ */
const defaultSettings = {
  botname: 'Asistente webAI',
  business: 'webAI Studio',
  welcome: '¡Hola! 👋 Soy el asistente virtual de webAI Studio. Estoy aquí para ayudarte a encontrar la solución web perfecta para tu negocio. ¿Empezamos?',
  systemprompt: 'Eres un asistente de ventas amigable de webAI Studio. Ayuda al cliente a elegir el plan correcto. Sé breve, claro y orientado a la solución.',
  alertwords: 'problema,queja,reclamo,no funciona,estafa,fraude,molesto,enojado,terrible,pésimo,malo,devolución',
};
const defaultFlow = [
  { id:1, question:'¿Cuál es tu nombre?',                                 type:'text',    options:[],                                                          isAlert:false, key:'nombre' },
  { id:2, question:'¿Qué tipo de negocio tienes?',                        type:'options', options:['Tienda física','Servicio profesional','E-commerce','Restaurante / comida','Otro'], isAlert:false, key:'negocio' },
  { id:3, question:'¿Cuál es tu presupuesto aproximado?',                 type:'options', options:['Menos de $500K','$500K – $1M','Más de $1M','No sé aún'],   isAlert:false, key:'presupuesto' },
  { id:4, question:'¿Tienes página web actualmente?',                     type:'options', options:['Sí, pero necesito mejorarla','No tengo ninguna','Tengo redes pero no web'], isAlert:false, key:'web_actual' },
  { id:5, question:'¿Cuál es tu número de WhatsApp para contactarte?',   type:'text',    options:[],                                                          isAlert:false, key:'whatsapp' },
  { id:6, question:'¿Tienes algún comentario, problema o duda especial?', type:'text',    options:[],                                                          isAlert:true,  key:'comentario' },
];

/* ════════════════════════════════
   RUNTIME STATE
════════════════════════════════ */
let flow        = [];
let settings    = {};
let step        = 0;
let lead        = {};
let flowStarted = false;
let finished    = false;
let msgHistory  = [];   // for Claude context

/* ════════════════════════════════
   INIT
════════════════════════════════ */
function init() {
  const stored = loadState();
  flow     = (stored.flow     && stored.flow.length)     ? stored.flow     : defaultFlow;
  settings = stored.settings ? { ...defaultSettings, ...stored.settings } : defaultSettings;

  // Update bot name in header
  document.getElementById('botNameHeader').textContent = settings.botname || 'Asistente webAI';

  lead = { timestamp: new Date().toLocaleString('es-CO') };
  step = 0;
  flowStarted = false;
  finished = false;

  addBotMsg(settings.welcome);
  setTimeout(() => showStartOptions(), 700);
}

function showStartOptions() {
  showOptions(['Sí, quiero comenzar ✓', 'Tengo una pregunta primero']);
  // wire buttons
  const btns = document.querySelectorAll('.opt-btn');
  if (btns[0]) btns[0].onclick = () => { sendUserDisplay('Sí, quiero comenzar ✓'); clearOptions(); startFlow(); };
  if (btns[1]) btns[1].onclick = () => { sendUserDisplay('Tengo una pregunta primero'); clearOptions(); askFreeQuestion(); };
}

function startFlow() {
  flowStarted = true;
  document.getElementById('progressWrap').style.display = 'block';
  updateProgress(0);
  setTimeout(() => askStep(0), 400);
}

function askFreeQuestion() {
  addBotMsg('¡Claro! ¿Cuál es tu pregunta?');
  enableInput();
  document.getElementById('sendBtn').onclick = () => {
    const val = document.getElementById('chatInput').value.trim();
    if (!val) return;
    clearInput();
    sendUserDisplay(val);
    checkAlertWords(val);
    msgHistory.push({ role:'user', content: val });
    askClaude(val, () => {
      // After free Q, offer to start flow
      setTimeout(() => {
        addBotMsg('¿Te gustaría continuar con algunas preguntas rápidas para que podamos ayudarte mejor?');
        showOptions(['Sí, sigamos ✓','No gracias']);
        const b = document.querySelectorAll('.opt-btn');
        if(b[0]) b[0].onclick = () => { sendUserDisplay('Sí, sigamos ✓'); clearOptions(); startFlow(); };
        if(b[1]) b[1].onclick = () => { sendUserDisplay('No gracias'); clearOptions(); addBotMsg('¡Perfecto! Si necesitas algo más, escríbeme. 👋'); disableInput(); };
      }, 500);
    });
  };
}

/* ════════════════════════════════
   FLOW ENGINE
════════════════════════════════ */
function askStep(idx) {
  if (idx >= flow.length) { finishFlow(); return; }
  const s = flow[idx];
  updateProgress(idx);

  setTimeout(() => {
    addBotMsg(s.question);
    if (s.type === 'options' && s.options && s.options.length) {
      disableInput();
      showOptions(s.options);
      document.querySelectorAll('.opt-btn').forEach(btn => {
        btn.onclick = () => { handleFlowAnswer(btn.textContent); };
      });
    } else {
      clearOptions();
      enableInput();
      document.getElementById('sendBtn').onclick = () => {
        const val = document.getElementById('chatInput').value.trim();
        if (!val) return;
        clearInput();
        handleFlowAnswer(val);
      };
    }
  }, 400);
}

function handleFlowAnswer(val) {
  sendUserDisplay(val);
  clearOptions();
  disableInput();

  const s = flow[step];
  lead[s.key || `paso_${step+1}`] = val;
  checkAlertWords(val);
  if (s.isAlert && val && val.length > 2) {
    triggerAlert(`Respuesta en pregunta marcada: "${s.question}" → "${val}"`, lead);
  }

  step++;
  showTyping();
  setTimeout(() => {
    hideTyping();
    if (step < flow.length) askStep(step);
    else finishFlow();
  }, 850);
}

function finishFlow() {
  finished = true;
  const name = lead.nombre || 'amigo/a';
  updateProgress(flow.length);
  saveLead(lead);

  addBotMsg(`¡Muchas gracias ${name}! 🎉 Recibimos toda tu información. Un asesor de nuestro equipo te contactará muy pronto.`);

  document.getElementById('finishCard').style.display = 'block';
  disableInput();
  clearOptions();

  // Offer extra help
  setTimeout(() => {
    showOptions(['¿Cuánto cuesta?','¿Cuánto tiempo tarda?','¿Qué incluye el servicio?']);
    document.querySelectorAll('.opt-btn').forEach(btn => {
      btn.onclick = () => {
        const q = btn.textContent;
        sendUserDisplay(q);
        clearOptions();
        msgHistory.push({ role:'user', content: q });
        askClaude(q, () => {
          setTimeout(() => {
            showOptions(['Otra pregunta','No gracias, ya está']);
            const b = document.querySelectorAll('.opt-btn');
            if(b[0]) b[0].onclick = () => { sendUserDisplay('Tengo otra pregunta'); clearOptions(); enableInput();
              document.getElementById('sendBtn').onclick = () => {
                const v = document.getElementById('chatInput').value.trim(); if(!v) return;
                clearInput(); sendUserDisplay(v); msgHistory.push({role:'user',content:v}); askClaude(v, null);
              };
            };
            if(b[1]) b[1].onclick = () => { sendUserDisplay('No, ya está'); clearOptions(); addBotMsg('¡Perfecto! Fue un placer ayudarte. 👋 Hasta pronto.'); };
          }, 300);
        });
      };
    });
  }, 1200);
}

/* ════════════════════════════════
   CLAUDE AI
════════════════════════════════ */
function askClaude(userMsg, onDone) {
  const apiKey = getApiKey();
  msgHistory.push({ role:'user', content: userMsg });

  if (!apiKey || !apiKey.startsWith('sk-ant')) {
    // Fallback local responses
    const fallbacks = {
      'precio':'Nuestros planes van desde $490.000 hasta $1.600.000 COP según lo que necesites. ¿Te cuento los detalles?',
      'tiempo':'Entregamos la mayoría de páginas en 3 a 5 días hábiles después de tener toda la información.',
      'incluye':'Cada plan incluye dominio, hosting, diseño personalizado, versión móvil, formulario de contacto y botón de WhatsApp. Los planes superiores añaden tienda, SEO, chatbot IA y más.',
    };
    const key = Object.keys(fallbacks).find(k => userMsg.toLowerCase().includes(k));
    showTyping();
    setTimeout(() => {
      hideTyping();
      const reply = key ? fallbacks[key] : 'Gracias por tu pregunta. Te recomendamos hablar con nuestro equipo para darte la respuesta más precisa. ¡Estaremos en contacto pronto!';
      addBotMsg(reply);
      msgHistory.push({ role:'assistant', content: reply });
      if (onDone) onDone();
    }, 900);
    return;
  }

  showTyping();
  const sysPrompt = settings.systemprompt || defaultSettings.systemprompt;

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 280,
      system: sysPrompt,
      messages: msgHistory.slice(-8)  // last 8 turns for context
    })
  })
  .then(r => r.json())
  .then(data => {
    hideTyping();
    const reply = data?.content?.[0]?.text || 'Disculpa, no pude procesar eso. ¿Puedes reformular tu pregunta?';
    addBotMsg(reply);
    msgHistory.push({ role:'assistant', content: reply });
    if (onDone) onDone();
  })
  .catch(() => {
    hideTyping();
    addBotMsg('Hubo un problema de conexión. Por favor intenta de nuevo en un momento.');
    if (onDone) onDone();
  });
}

function sendMsg() {
  // Only active when input is enabled and there's no specific onclick handler set
  const val = document.getElementById('chatInput').value.trim();
  if (!val || finished) return;
  clearInput();
  sendUserDisplay(val);
  msgHistory.push({ role:'user', content: val });
  checkAlertWords(val);
  askClaude(val, null);
}

/* ════════════════════════════════
   ALERTS
════════════════════════════════ */
function checkAlertWords(text) {
  const words = (settings.alertwords || defaultSettings.alertwords).split(',').map(w => w.trim().toLowerCase()).filter(Boolean);
  const hit = words.find(w => text.toLowerCase().includes(w));
  if (hit) triggerAlert(`Palabra clave detectada: "${hit}" → "${text.substring(0,80)}"`, { ...lead });
}

function triggerAlert(reason, leadSnap) {
  const stored = loadState();
  const alerts = stored.alerts || [];
  alerts.unshift({ id: Date.now(), reason, lead: leadSnap, time: new Date().toLocaleString('es-CO'), read: false });
  saveState({ alerts });
}

/* ════════════════════════════════
   LEAD SAVE
════════════════════════════════ */
function saveLead(l) {
  const stored = loadState();
  const leads  = stored.leads  || [];
  const convs  = stored.conversations || [];
  const entry  = { ...l, id: Date.now() };
  leads.unshift(entry);
  convs.unshift(entry);
  saveState({ leads, conversations: convs });
}

/* ════════════════════════════════
   UI HELPERS
════════════════════════════════ */
function addBotMsg(text) {
  const msgs = document.getElementById('chatMessages');
  const d = document.createElement('div');
  d.className = 'msg bot';
  d.innerHTML = `<div class="msg-bubble">${text}</div><div class="msg-time">${now()}</div>`;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}
function sendUserDisplay(text) {
  const msgs = document.getElementById('chatMessages');
  const d = document.createElement('div');
  d.className = 'msg user';
  d.innerHTML = `<div class="msg-bubble">${escHtml(text)}</div><div class="msg-time">${now()}</div>`;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}
function showTyping() {
  const msgs = document.getElementById('chatMessages');
  const d = document.createElement('div');
  d.className = 'typing-wrap'; d.id = 'typingEl';
  d.innerHTML = `<div class="typing-bubble"><div class="td"></div><div class="td"></div><div class="td"></div></div>`;
  msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
}
function hideTyping() { const el=document.getElementById('typingEl'); if(el) el.remove(); }
function showOptions(opts) {
  const c = document.getElementById('chatOptions');
  c.innerHTML = '';
  opts.forEach(o => {
    const b = document.createElement('button');
    b.className = 'opt-btn'; b.textContent = o;
    c.appendChild(b);
  });
}
function clearOptions() { document.getElementById('chatOptions').innerHTML = ''; }
function enableInput() {
  document.getElementById('chatInput').disabled = false;
  document.getElementById('chatInput').placeholder = 'Escribe tu respuesta...';
  document.getElementById('sendBtn').disabled = false;
}
function disableInput() {
  document.getElementById('chatInput').disabled = true;
  document.getElementById('chatInput').placeholder = 'Selecciona una opción ↑';
  document.getElementById('sendBtn').disabled = true;
}
function clearInput() { document.getElementById('chatInput').value = ''; }
function updateProgress(idx) {
  const total = flow.length;
  const pct = total ? Math.round((idx / total) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = idx < total ? `Pregunta ${idx + 1} de ${total}` : '¡Completado!';
  document.getElementById('progressPct').textContent = pct + '%';
}
function now() { return new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'}); }
function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

init();
</script>
</body>
</html>
