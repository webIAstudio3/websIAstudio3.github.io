<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080D;--bg2:#0F1120;--bg3:#181B2E;--bg4:#1F2340;
  --lime:#C8FF00;--sky:#4FC3F7;--violet:#7C5CFC;
  --coral:#FF6B6B;--amber:#FFB347;--mint:#00E5A0;
  --off:#F0F2FF;--muted:#7A7D95;--border:rgba(255,255,255,0.07);
  --fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;
}
html,body{height:100%}
body{font-family:var(--fb);background:var(--bg);color:var(--off);display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
.hd{background:var(--bg2);border-bottom:1px solid var(--border);padding:.8rem 1rem;display:flex;align-items:center;gap:.6rem;flex-shrink:0}
.hd-mark{width:34px;height:34px;background:var(--lime);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-weight:800;font-size:.95rem;color:var(--bg);flex-shrink:0}
.hd-t{flex:1;min-width:0}
.hd-name{font-family:var(--fh);font-size:.85rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hd-st{font-size:.63rem;color:var(--mint);display:flex;align-items:center;gap:.3rem;margin-top:.1rem}
.hd-dot{width:6px;height:6px;border-radius:50%;background:var(--mint);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.hd-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);cursor:pointer;font-size:.72rem;padding:.3rem .55rem;font-family:var(--fb);transition:color .15s,border-color .15s;flex-shrink:0;line-height:1}
.hd-btn:hover{color:var(--lime);border-color:rgba(200,255,0,.35)}
.hd-x{font-size:.95rem;padding:.28rem .5rem}
.hd-x:hover{color:var(--coral);border-color:rgba(255,107,107,.35)}

/* CHAT */
.chat{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.65rem;scroll-behavior:smooth}
.chat::-webkit-scrollbar{width:4px}
.chat::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
.msg{max-width:86%;padding:.62rem .85rem;border-radius:14px;font-size:.82rem;line-height:1.55;white-space:pre-wrap;word-break:break-word;animation:in .25s ease}
@keyframes in{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
.m-bot{background:var(--bg3);border:1px solid var(--border);border-bottom-left-radius:4px;align-self:flex-start}
.m-user{background:rgba(200,255,0,.13);border:1px solid rgba(200,255,0,.22);color:var(--off);border-bottom-right-radius:4px;align-self:flex-end}
.m-sys{align-self:center;background:none;border:none;color:var(--muted);font-size:.66rem;padding:.1rem .4rem;text-align:center}

/* typing */
.typing{display:flex;gap:.28rem;align-self:flex-start;background:var(--bg3);border:1px solid var(--border);border-radius:14px;border-bottom-left-radius:4px;padding:.7rem .85rem}
.typing i{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:tp 1.1s infinite}
.typing i:nth-child(2){animation-delay:.18s}.typing i:nth-child(3){animation-delay:.36s}
@keyframes tp{0%,100%{opacity:.25;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}

/* OPTIONS */
.opts{display:flex;flex-direction:column;gap:.42rem;align-self:flex-start;max-width:86%;animation:in .25s ease}
.opt{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:.55rem .85rem;color:var(--off);font-size:.79rem;font-family:var(--fb);cursor:pointer;text-align:left;transition:border-color .15s,background .15s,transform .12s;line-height:1.4}
.opt:hover{border-color:rgba(200,255,0,.45);background:var(--bg4);transform:translateX(3px)}
.opt.alt{border-style:dashed;color:var(--muted);font-size:.74rem}
.opt.alt:hover{color:var(--off)}
.opt.sel{border-color:var(--lime);background:rgba(200,255,0,.13);color:var(--off)}
.opt.sel::before{content:'✓ ';color:var(--lime);font-weight:700}
.opt-confirm{background:var(--lime);color:var(--bg);border:none;border-radius:12px;padding:.6rem .85rem;font-family:var(--fh);font-weight:700;font-size:.8rem;cursor:pointer;text-align:center;margin-top:.2rem;transition:transform .12s}
.opt-confirm:hover{transform:scale(1.02)}

/* PLAN CARD */
.pcard{align-self:flex-start;max-width:92%;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:.95rem 1rem;animation:in .25s ease}
.pcard.rec{border-color:rgba(200,255,0,.4);box-shadow:0 0 24px rgba(200,255,0,.06)}
.pc-tag{display:inline-block;border-radius:999px;padding:.14rem .55rem;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;background:rgba(200,255,0,.12);color:var(--lime);margin-bottom:.45rem}
.pc-name{font-family:var(--fh);font-size:.95rem;font-weight:800}
.pc-price{font-family:var(--fh);font-size:1.35rem;font-weight:800;color:var(--lime);margin:.2rem 0 .45rem}
.pc-price small{font-size:.62rem;color:var(--muted);font-weight:400;font-family:var(--fb)}
.pc-feats{font-size:.72rem;color:var(--muted);line-height:1.8;margin-bottom:.6rem}
.pc-feats b{color:var(--off);font-weight:500}

/* INPUT */
.foot{flex-shrink:0;border-top:1px solid var(--border);background:var(--bg2);padding:.6rem .8rem .7rem}
.tools{display:flex;gap:.4rem;margin-bottom:.5rem;flex-wrap:wrap}
.tool{background:none;border:1px solid var(--border);border-radius:999px;color:var(--muted);cursor:pointer;font-size:.64rem;padding:.24rem .6rem;font-family:var(--fb);transition:color .15s,border-color .15s;display:none}
.tool.show{display:inline-block}
.tool:hover{color:var(--lime);border-color:rgba(200,255,0,.35)}
.tool.warn:hover{color:var(--amber);border-color:rgba(255,179,71,.4)}
.irow{display:flex;gap:.5rem}
.inp{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:.6rem .85rem;color:var(--off);font-size:.82rem;font-family:var(--fb);outline:none;transition:border-color .2s}
.inp:focus{border-color:rgba(200,255,0,.4)}
.inp:disabled{opacity:.45;cursor:not-allowed}
.send{background:var(--lime);border:none;border-radius:12px;color:var(--bg);font-weight:700;font-family:var(--fh);font-size:.78rem;padding:0 1.05rem;cursor:pointer;transition:transform .12s,opacity .15s}
.send:hover{transform:scale(1.04)}
.send:disabled{opacity:.4;cursor:not-allowed;transform:none}
.brand{font-size:.58rem;color:var(--muted);text-align:center;margin-top:.5rem;opacity:.7}
.brand b{color:var(--lime);font-weight:600}
.wa{display:inline-flex;align-items:center;gap:.4rem;background:var(--mint);color:var(--bg);border:none;border-radius:12px;padding:.55rem .95rem;font-size:.78rem;font-weight:700;font-family:var(--fb);cursor:pointer;text-decoration:none;transition:transform .12s;margin-top:.2rem}
.wa:hover{transform:scale(1.03)}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

// ══════════════════════════════════════════════════════════════════
const SK='webai_state', AK='webai_apikey';
function loadSt(){ try{return JSON.parse(localStorage.getItem(SK)||'{}');}catch(e){return{};} }
function saveSt(patch){ try{localStorage.setItem(SK,JSON.stringify({...loadSt(),...patch}));}catch(e){} }

// ══════════════════════════════════════════════════════════════════
//  ENTREGA DE LEADS  →  Correo (Formspree) + Panel (JSONBin)
//  Pega aquí tus claves (instrucciones en el mensaje del asistente):
// ══════════════════════════════════════════════════════════════════
const LEAD_CONFIG = {
  // 1) Formspree: correo instantáneo con cada lead
  formspreeId: 'mnjylboy',
  // 2) JSONBin: almacenamiento compartido para el panel.
  //    Aquí va una ACCESS KEY de solo Read+Update (NO la Master Key),
  //    porque este archivo es público. Aunque alguien la vea, no puede borrar leads.
  jsonbinId:   '6a2f1490f5f4af5e29f1b333',
  jsonbinKey:  '$2a$10$02OsCxQCcLs8.o54DESDk.bp8fztQqeaDSa3.u7OC2agGPlE2BmB.'
};

// Envía el lead a los servicios online (correo + panel)
async function sendLeadOnline(lead){
  // ── A) Correo vía Formspree ──
  if(LEAD_CONFIG.formspreeId && !LEAD_CONFIG.formspreeId.startsWith('PEGA')){
    try{
      await fetch('https://formspree.io/f/'+LEAD_CONFIG.formspreeId,{
        method:'POST',
        headers:{'Content-Type':'application/json','Accept':'application/json'},
        body:JSON.stringify({
          _subject:'🟢 Nuevo lead webAI: '+(lead.nombre||'Cliente')+' — '+(lead.plan_elegido||''),
          ...lead
        })
      });
    }catch(e){ console.log('Formspree:',e.message); }
  }
  // ── B) Panel vía JSONBin ──
  await pushToBin('lead',lead);
}

// Sube un lead o una alerta al bin compartido SIN borrar lo que ya existe.
async function pushToBin(tipo,item){
  if(!LEAD_CONFIG.jsonbinId || LEAD_CONFIG.jsonbinId.startsWith('PEGA')) return;
  // Una Access Key va en X-Access-Key; una Master Key en X-Master-Key.
  // Enviamos ambos headers con la clave para que funcione con cualquiera de las dos.
  const h={'Content-Type':'application/json','X-Access-Key':LEAD_CONFIG.jsonbinKey};
  try{
    // leer estado actual del bin (leads + alerts)
    let rec={leads:[],alerts:[]}; let leyo=false;
    try{
      const r=await fetch('https://api.jsonbin.io/v3/b/'+LEAD_CONFIG.jsonbinId+'/latest?t='+Date.now(),{headers:h});
      if(r.ok){ const d=await r.json(); rec={leads:(d.record&&d.record.leads)||[],alerts:(d.record&&d.record.alerts)||[]}; leyo=true; }
      else { console.log('JSONBin lectura falló:',r.status,await r.text()); }
    }catch(e){ console.log('JSONBin lectura error:',e.message); }
    if(!leyo) console.log('⚠️ No pude leer el bin antes de escribir (revisa permiso Read de la Access Key)');
    if(tipo==='lead')  rec.leads.unshift(item);
    if(tipo==='alert') rec.alerts.unshift(item);
    const w=await fetch('https://api.jsonbin.io/v3/b/'+LEAD_CONFIG.jsonbinId,{
      method:'PUT',headers:h,body:JSON.stringify(rec)
    });
    if(w.ok) console.log('✅ Lead/alerta guardado en JSONBin');
    else console.log('❌ JSONBin escritura falló:',w.status,await w.text());
  }catch(e){ console.log('JSONBin error:',e.message); }
}

function loadConfig(){
  const s=loadSt();
  const j=CONFIG_JSON||{};
  // El admin del MISMO navegador manda si guardó algo más reciente que lo publicado;
  // para los visitantes manda chat-config.json (publicado desde el admin).
  const useLocal = !!s._lastSaved && (!j.published || s._lastSaved>=j.published);
  const src = useLocal ? s : j;
  flow      = (src.flow&&src.flow.length)?src.flow:JSON.parse(JSON.stringify(DEF_FLOW));
  recRules  = (src.recRules&&src.recRules.length)?src.recRules:JSON.parse(JSON.stringify(DEF_REC_RULES));
  recDefault= src.recDefault||'lanzamiento';
  settings  = src.settings?{...DEF_SETTINGS,...src.settings}:{...DEF_SETTINGS};
  const sq=src.planQs||{};
  planQs={
    lanzamiento:(sq.lanzamiento&&sq.lanzamiento.length)?sq.lanzamiento:JSON.parse(JSON.stringify(DEF_PLAN_QS.lanzamiento)),
    crecimiento:(sq.crecimiento&&sq.crecimiento.length)?sq.crecimiento:JSON.parse(JSON.stringify(DEF_PLAN_QS.crecimiento)),
    pro:(sq.pro&&sq.pro.length)?sq.pro:JSON.parse(JSON.stringify(DEF_PLAN_QS.pro))
  };
  lastSeen = Math.max(s._lastSaved||0, j.published||0);
  document.getElementById('h-name').textContent=settings.botname||'Asistente webAI';
}

// Sincronización en vivo con el admin (misma web, mismo navegador):
function refreshIfChanged(){
  const s=loadSt();
  const stamp=Math.max(s._lastSaved||0,(CONFIG_JSON&&CONFIG_JSON.published)||0);
  if(stamp>lastSeen && phase==='welcome'){ loadConfig(); chat.innerHTML=''; welcome(); }
  else if(stamp>lastSeen){ lastSeen=stamp; loadConfig0Soft(); }
}
function loadConfig0Soft(){ // a mitad de conversación: actualiza nombre y settings sin romper el flujo
  const s=loadSt();
  if(s.settings){ settings={...DEF_SETTINGS,...s.settings}; document.getElementById('h-name').textContent=settings.botname||'Asistente webAI'; }
}
window.addEventListener('storage',e=>{ if(e.key===SK) refreshIfChanged(); });

function esc(s){ return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function scroll(){ chat.scrollTop=chat.scrollHeight; }
function addMsg(txt,who){ const d=document.createElement('div'); d.className='msg m-'+who; d.textContent=txt; chat.appendChild(d); scroll(); return d; }
function addSys(txt){ const d=document.createElement('div'); d.className='msg m-sys'; d.textContent=txt; chat.appendChild(d); scroll(); }
function addHTML(html,cls){ const d=document.createElement('div'); d.className=cls; d.innerHTML=html; chat.appendChild(d); scroll(); return d; }
function clearOpts(){ chat.querySelectorAll('.opts,.pcard').forEach(e=>{ if(e.dataset.keep!=='1') e.remove(); }); }
function typing(cb,ms){
  const t=document.createElement('div'); t.className='typing'; t.innerHTML='<i></i><i></i><i></i>';
  chat.appendChild(t); scroll();
  setTimeout(()=>{ t.remove(); cb(); },ms||650);
}
function botSay(txt,cb){ typing(()=>{ addMsg(txt,'bot'); if(cb)cb(); }); }
function setInput(on,ph){
  inp.disabled=!on; sendBtn.disabled=!on;
  inp.placeholder=ph||'Escribe aquí...';
  if(on) setTimeout(()=>inp.focus(),60);
}
function updateTools(){
  document.getElementById('t-back').classList.toggle('show', history.length>0 && (phase==='diag'||phase==='plan'||phase==='rec'));
  document.getElementById('t-plans').classList.toggle('show', phase==='plan'||phase==='done');
}

function welcome(){

function registerConv(){
  if(convId) return;
  convId='c'+Date.now();
  const s=loadSt(); const convs=s.conversations||[];

// — Fase diagnóstico —
function askDiag(){
  phase='diag'; updateTools();
  if(qi>=flow.length){ recommend(); return; }
  const q=flow[qi];
  botSay(q.question,()=>{
    if(q.type==='select_otro'&&q.options&&q.options.length){
      setInput(false);
      const o=addHTML('','opts');
      o.innerHTML=q.options.map(op=>'<button class="opt" onclick="pickSelectOtro(this.textContent)">'+esc(op)+'</button>').join('');
    } else if(q.type==='multi'&&q.options&&q.options.length){
      renderMulti(q.options);
    } else if(q.type==='options'&&q.options&&q.options.length){
      setInput(false);
      const o=addHTML('','opts');
      o.innerHTML=q.options.map(op=>'<button class="opt" onclick="answer(this.textContent)">'+esc(op)+'</button>').join('');
    } else setInput(true,'Escribe tu respuesta...');
  });
}
// — Selección múltiple —
let multiSel=[];
function renderMulti(options){
  setInput(false); multiSel=[];
  const o=addHTML('','opts'); o.id='multi-box';
  o.innerHTML=options.map(op=>'<button class="opt" onclick="toggleMulti(this,\''+esc(op).replace(/'/g,"\\'")+'\')">'+esc(op)+'</button>').join('')+
    '<button class="opt-confirm" onclick="confirmMulti()">Continuar →</button>';
}
function toggleMulti(btn,val){
  const i=multiSel.indexOf(val);
  if(i>=0){ multiSel.splice(i,1); btn.classList.remove('sel'); }
  else { multiSel.push(val); btn.classList.add('sel'); }
}
function confirmMulti(){
  if(!multiSel.length) return;
  answer(multiSel.join(', '));
}
// — Selección con opción "Otro" de texto libre —
function pickSelectOtro(val){
  if(/^otro$/i.test(val.trim())){
    clearOpts();
    addSys('Escribe a qué se dedica tu negocio 👇');
    setInput(true,'Ej: floristería, taller mecánico...');
  } else {
    answer(val);
  }
}
function answer(val){
  val=(val||'').trim(); if(!val) return;
  clearOpts(); setInput(false);
  const list = phase==='diag'?flow:(planQs[plan]||[]);
  const q=list[qi]; if(!q) return;
  addMsg(val,'user');
  history.push({phase,qi,key:q.key,msgIndex:chat.children.length-2,plan});
  answers[q.key]=val;
  checkAlertWords(val,q);
  qi++;
  setTimeout(phase==='diag'?askDiag:askPlanQ,420);
}
function submitText(){ if(!inp.disabled){ const v=inp.value; inp.value=''; if(phase==='free') freeAsk(v); else answer(v); } }
inp.addEventListener('keydown',e=>{ if(e.key==='Enter') submitText(); });

// — Recomendación —
function evalPlan(){
  // Motor por puntos: pondera las respuestas del diagnóstico y elige
  // el plan que mejor encaja con la NECESIDAD real del cliente.
  const g = k => (answers[k]||'').toString().toLowerCase();
  const obj = g('objetivo'), vol = g('volumen_mes'), msg = g('mensajes'),
        etapa = g('etapa'), web = g('tiene_web'), canales = g('canales');
  let pts = { lanzamiento:0, crecimiento:0, pro:0, auto360:0 };

  // — Canales: el factor que define la necesidad MULTICANAL (clave para Auto 360) —
  const multicanal = canales.includes('tres') || canales.includes('3 o') || canales.includes('tres o');
  const dosCanales = canales.includes('dos');
  if(multicanal)  pts.auto360 += 5;          // 3+ canales → automatización total
  if(dosCanales)  pts.pro += 3;              // 2 canales → Pro (conecta 2)

  // — Objetivo (lo que más pesa: la intención explícita del cliente manda) —
  if(obj.includes('presencia'))            pts.lanzamiento += 3;
  if(obj.includes('más clientes')||obj.includes('mas clientes')) { pts.lanzamiento += 1; pts.crecimiento += 3; }
  if(obj.includes('vender productos'))     pts.crecimiento += 4;
  if(obj.includes('reservas')||obj.includes('citas')) pts.crecimiento += 3;
  if(obj.includes('automatizar'))          { pts.pro += 5; pts.auto360 += 3; }

  // — Volumen de clientes —
  if(vol.includes('menos de 10'))          pts.lanzamiento += 2;
  if(vol.includes('10 a 30'))              { pts.lanzamiento += 1; pts.crecimiento += 1; }
  if(vol.includes('30 a 100'))             pts.crecimiento += 2;
  if(vol.includes('más de 100')||vol.includes('mas de 100')) { pts.pro += 3; pts.auto360 += 2; }

  // — Mensajes que atiende (señal de necesidad de automatización) —
  if(msg.includes('bastantes'))            pts.crecimiento += 2;
  if(msg.includes('muchisimos')||msg.includes('se me escapan')) { pts.pro += 3; pts.auto360 += 2; }

  // — Etapa del negocio —
  if(etapa.includes('empezando'))          pts.lanzamiento += 2;
  if(etapa.includes('crecer'))             pts.crecimiento += 2;
  if(etapa.includes('escalar')||etapa.includes('automatizar')) { pts.pro += 3; pts.auto360 += 2; }

  // — Si NO tiene web, suma a la entrada (presencia primero) —
  if(web.includes('no'))                   pts.lanzamiento += 1;

  // — REGLA MULTICANAL: si atiende 3+ canales y quiere automatizar/escalar → Auto 360 —
  if(multicanal && (obj.includes('automatizar') || etapa.includes('escalar') || vol.includes('más de 100') || vol.includes('mas de 100'))){
    return 'auto360';
  }

  // — PISO por necesidad técnica: ciertos objetivos requieren mínimo cierto plan —
  if(obj.includes('vender productos') || obj.includes('reservas') || obj.includes('citas')){
    if(multicanal && pts.auto360 >= 7) return 'auto360';
    if(pts.pro >= 6 && pts.pro >= pts.crecimiento) return 'pro';
    return 'crecimiento';
  }
  if(obj.includes('automatizar')){
    if(multicanal) return 'auto360';
    return pts.pro >= pts.crecimiento ? 'pro' : 'crecimiento';
  }

  // Elige el de mayor puntaje. En empate, respeta la intención explícita del objetivo.
  let mejor = recDefault||'lanzamiento', max = -1;
  for(const k of ['lanzamiento','crecimiento','pro','auto360']){
    if(pts[k] > max){ max = pts[k]; mejor = k; }
  }
  if((obj.includes('más clientes')||obj.includes('mas clientes')) && pts.crecimiento >= max) return 'crecimiento';
  // Si todo quedó en 0 (respuestas atípicas), usa el plan por defecto.
  if(max <= 0) return recDefault||'lanzamiento';
  return mejor;
}
function recommend(){
  phase='rec'; updateTools(); setInput(false);
  // Si el cliente YA tiene web, sugerimos "Solo el Chat" sin forzar:
  // le damos a elegir entre aprovechar su web actual o ver la recomendación completa.
  const yaTieneWeb = (answers.tiene_web||'').toString().toLowerCase().includes('s'); // "Sí"
  if(yaTieneWeb && !sugerenciaSoloChatMostrada){
    sugerenciaSoloChatMostrada = true;
    botSay('Veo que '+(answers.nombre?answers.nombre+', ':'')+'ya tienes página web 🙌 Entonces quizás no necesites una nueva: podemos instalarle un *chat de IA* a tu web actual para que capte clientes automáticamente. ¿Qué prefieres?',()=>{
      const P=PLANS.solochat;
      const c=addHTML('','pcard rec');
      c.innerHTML='<span class="pc-tag">Ideal si ya tienes web</span>'+
        '<div class="pc-name">'+P.emoji+' '+esc(P.name)+'</div>'+
        '<div class="pc-price">'+P.price+' <small>COP + $100.000/mes</small></div>'+
        '<div class="pc-feats">'+P.feats+'</div>';
      const o=addHTML('','opts');
      o.innerHTML='<button class="opt" onclick="pickPlan(\'solochat\',true)">💬 Quiero solo el chat para mi web</button>'+
                  '<button class="opt alt" onclick="recomendarPlanCompleto()">Prefiero ver qué plan completo me conviene →</button>';
    });
    return;
  }
  recomendarPlanCompleto();
}
function razonRecomendacion(plan){
  const g = k => (answers[k]||'').toString().toLowerCase();
  const obj=g('objetivo'), vol=g('volumen_mes'), msg=g('mensajes'), etapa=g('etapa'), web=g('tiene_web'), canales=g('canales');
  const r=[];
  if(plan==='lanzamiento'){
    if(web.includes('no')) r.push('aún no tienes presencia web, y este es el paso perfecto para empezar a aparecer profesionalmente');
    if(etapa.includes('empezando')) r.push('estás arrancando, así que conviene invertir con cabeza y crecer por etapas');
    if(vol.includes('menos de 10')) r.push('con tu volumen actual, una landing potente con chat de IA es justo lo que necesitas para captar más sin gastar de más');
    return r.length?('Te lo recomiendo porque '+r.join('; ')+'. Es la inversión más inteligente para tu momento. 💡'):'Es la opción ideal para empezar con fuerza sin sobreinvertir. 💡';
  }
  if(plan==='crecimiento'){
    if(obj.includes('vender')) r.push('quieres vender, y este plan incluye tienda y pasarela de pagos para cobrar online');
    if(obj.includes('reservas')||obj.includes('citas')) r.push('necesitas recibir reservas/citas, y aquí lo automatizamos');
    if(obj.includes('clientes')) r.push('tu meta es conseguir más clientes, y este plan suma SEO y automatización de WhatsApp que cierra ventas por ti');
    if(msg.includes('bastantes')) r.push('ya recibes bastantes mensajes y la automatización te ayuda a no perder ninguno');
    return r.length?('Te lo recomiendo porque '+r.join('; ')+'. Es el plan que más resultados da por su precio. 🚀'):'Es el plan más completo para vender en serio por WhatsApp. 🚀';
  }
  if(plan==='pro'){
    if(obj.includes('automatizar')) r.push('quieres automatizar tu atención y ventas, que es justo lo que hace este plan con IA en dos canales');
    if(canales.includes('dos')) r.push('atiendes por dos canales, y este plan los conecta ambos en automático');
    if(msg.includes('muchisimos')||msg.includes('escapan')) r.push('recibes tantos mensajes que se te escapan clientes: la IA los atiende a todos 24/7');
    if(vol.includes('más de 100')||vol.includes('mas de 100')) r.push('con tu volumen, automatizar deja de ser un lujo y se vuelve rentabilidad pura');
    return r.length?('Te lo recomiendo porque '+r.join('; ')+'. Se paga solo con los clientes que dejarías de perder. 🤖'):'Es la automatización en dos canales que tu negocio ya necesita. 🤖';
  }
  if(plan==='auto360'){
    if(canales.includes('tres')) r.push('atiendes por tres o más canales, y este plan los conecta TODOS en un solo lugar automatizado');
    if(obj.includes('automatizar')) r.push('quieres poner tu negocio en piloto automático, y este plan lo hace de punta a punta');
    if(msg.includes('muchisimos')||msg.includes('escapan')) r.push('con la cantidad de mensajes que recibes, perder clientes te cuesta más que automatizar');
    if(etapa.includes('escalar')) r.push('estás listo para escalar, y esto te da un equipo digital completo en todos tus canales sin contratar personal');
    if(vol.includes('más de 500')||vol.includes('mas de 500')||vol.includes('más de 100')) r.push('tu volumen justifica de sobra la inversión: cada cliente que no se te escapa la paga');
    return r.length?('Te lo recomiendo porque '+r.join('; ')+'. Es tu negocio entero trabajando solo, en todos tus canales a la vez. ⚡'):'Es la automatización total: todos tus canales atendidos solos, 24/7. ⚡';
  }
  return '';
}
function recomendarPlanCompleto(){
  clearOpts(); phase='rec'; updateTools(); setInput(false);
  const p=evalPlan(); const P=PLANS[p]||PLANS.lanzamiento;
  botSay('¡Listo'+(answers.nombre?', '+answers.nombre:'')+'! 🎯 Según lo que me contaste, este es el plan ideal para tu negocio:',()=>{
    const c=addHTML('','pcard rec');
    c.innerHTML='<span class="pc-tag">Recomendado para ti</span>'+
      '<div class="pc-name">'+P.emoji+' '+esc(P.name)+'</div>'+
      '<div class="pc-price">'+P.price+' <small>COP · pago de montaje</small></div>'+
      '<div class="pc-feats">'+P.feats+'</div>';
    botSay(razonRecomendacion(p),()=>{
      const o=addHTML('','opts');
      o.innerHTML='<button class="opt" onclick="pickPlan(\''+p+'\',true)">✓ Continuar con este plan</button>'+
                  '<button class="opt alt" onclick="showAllPlans()">Ver todos los planes y comparar →</button>';
    });
  });
}
function showAllPlans(){
  clearOpts(); phase='rec'; updateTools(); setInput(false);
  botSay('Estos son nuestros planes. Elige el que mejor te convenga 👇',()=>{
    Object.keys(PLANS).forEach(k=>{
      const P=PLANS[k];
      const c=addHTML('','pcard');
      c.innerHTML='<div class="pc-name">'+P.emoji+' '+esc(P.name)+'</div>'+
        '<div class="pc-price">'+P.price+' <small>COP</small></div>'+
        '<div class="pc-feats">'+P.feats+'</div>'+
        '<button class="opt" style="width:100%" onclick="pickPlan(\''+k+'\',false)">Elegir '+esc(P.name)+'</button>';
    });
  });
}
function pickPlan(p,fromRec){
  clearOpts();
  plan=p; const P=PLANS[p];
  addMsg('Elijo el '+P.name,'user');
  answers.plan_elegido=P.name;
  updateTools();
  // "Solo el Chat" no tiene preguntas de configuración: va directo a hablar con asesor
  if(!PLANES_CON_PREGUNTAS.includes(p)){
    phase='done';
    botSay('¡Buena elección! 💬 El paquete "Solo el Chat" es ideal si ya tienes una página web. Te paso directo con un asesor para coordinar la instalación.',()=>{ setTimeout(finish,250); });
    return;
  }
  phase='plan'; qi=0; updateTools();
  botSay('¡Excelente elección! '+P.emoji+' Ahora unas preguntas rápidas para configurar tu '+P.name+'. Si cambias de opinión, abajo puedes volver a elegir plan en cualquier momento.',()=>setTimeout(askPlanQ,250));
}
function backToPlans(){
  // limpia respuestas de la fase de plan y regresa al comparador
  const keys=(planQs[plan]||[]).map(q=>q.key);
  keys.forEach(k=>delete answers[k]);
  delete answers.plan_elegido;
  history=history.filter(h=>h.phase!=='plan');
  plan=null; leadSaved=false;
  addSys('— Volviste a la selección de plan —');
  showAllPlans();
}

// — Preguntas del plan —
function askPlanQ(){
  phase='plan'; updateTools();
  const list=planQs[plan]||[];
  if(qi>=list.length){ finish(); return; }
  const q=list[qi];
  botSay(q.question,()=>{
    if(q.type==='multi'&&q.options&&q.options.length){
      renderMulti(q.options);
    } else if(q.type==='options'&&q.options&&q.options.length){
      setInput(false);
      const o=addHTML('','opts');
      o.innerHTML=q.options.map(op=>'<button class="opt" onclick="answer(this.textContent)">'+esc(op)+'</button>').join('');
    } else setInput(true,'Escribe tu respuesta...');
  });
}

// — Cierre: guarda lead, alertas y muestra resumen —
function finish(){
  phase='done'; updateTools(); setInput(false);
  saveLead();
  const P=PLANS[plan];
  botSay('🎉 ¡Perfecto'+(answers.nombre?', '+answers.nombre:'')+'! Ya tengo todo lo que necesito.\n\nResumen: '+P.emoji+' '+P.name+' · '+P.price+' COP.\n\nNuestro equipo te contactará muy pronto por WhatsApp para arrancar tu proyecto 🚀',()=>{
    const o=addHTML('','opts'); o.dataset.keep='1';
    let h='';
    const wa='573215436013';
    if(wa) h+='<a class="wa" href="https://wa.me/'+wa+'?text='+encodeURIComponent('Hola, soy '+(answers.nombre||'')+' y acabo de completar el chat. Quiero el '+P.name+' para mi negocio '+(answers.negocio||''))+'" target="_blank" rel="noopener">📲 Hablar con un asesor ahora</a>';
    h+='<button class="opt alt" onclick="startFree()">🤖 Tengo otra pregunta</button>'+
       '<button class="opt alt" onclick="restartChat(true)">↺ Rehacer el chat</button>';
    o.innerHTML=h;
  });
}
function saveLead(){
  if(leadSaved) return; leadSaved=true;
  const lead={id:'l'+Date.now(),...answers,plan_elegido:answers.plan_elegido||(plan&&PLANS[plan]?PLANS[plan].name:''),timestamp:new Date().toISOString()};
  // guarda local (por si pruebas en el mismo navegador)
  const s=loadSt();
  const leads=s.leads||[]; leads.unshift(lead);
  const convs=(s.conversations||[]).map(c=>c.id===convId?{...c,completed:true}:c);
  saveSt({leads,conversations:convs});
  // envía online → llega a tu correo y a tu panel
  sendLeadOnline(lead);
}
function checkAlertWords(text,q){
  const words=(settings.alertwords||'').split(',').map(w=>w.trim().toLowerCase()).filter(Boolean);
  const t=(text||'').toLowerCase();
  const hit=words.find(w=>t.includes(w));
  const triggered = hit || (q&&q.isAlert);
  if(!triggered) return;
  const s=loadSt(); const alerts=s.alerts||[];
  const alerta={
    id:'a'+Date.now(),
    reason: hit ? ('El cliente mencionó "'+hit+'": “'+text.slice(0,120)+'”') : ('Respuesta marcada como alerta: “'+text.slice(0,120)+'”'),
    time:new Date().toLocaleString('es-CO'),
    lead:{nombre:answers.nombre||'Cliente',whatsapp:answers.whatsapp||''},
    read:false
  };
  alerts.unshift(alerta);
  saveSt({alerts});
  pushToBin('alert',alerta); // sincroniza la alerta con el panel
}

// ══════════════════════════════════════════════════════════════════
//  CORREGIR RESPUESTA / REHACER
// ══════════════════════════════════════════════════════════════════
function goBack(){
  const last=history.pop();
  if(!last) return;
  delete answers[last.key];
  while(chat.children.length>last.msgIndex) chat.removeChild(chat.lastChild);
  phase=last.phase; qi=last.qi; plan=last.plan;
  addSys('— Corrigiendo la respuesta anterior —');
  updateTools();
  setTimeout(phase==='diag'?askDiag:askPlanQ,250);
}
function restartChat(skipConfirm){
  if(!skipConfirm && phase!=='welcome' && !confirm('¿Rehacer el chat desde el inicio? Se borrarán las respuestas de esta conversación.')) return;
  convId=null;
  chat.innerHTML='';
  loadConfig();
  welcome();
}

// ══════════════════════════════════════════════════════════════════
//  PREGUNTA LIBRE (Claude) — usa la API key guardada en el admin
// ══════════════════════════════════════════════════════════════════
function startFree(){
  phase='free'; updateTools();
  botSay('¡Claro! Pregúntame lo que quieras sobre nuestros planes y servicios ✍️',()=>setInput(true,'Escribe tu pregunta...'));
}
async function freeAsk(txt){
  txt=(txt||'').trim(); if(!txt) return;
  addMsg(txt,'user'); setInput(false);
  checkAlertWords(txt,null);
  freeMsgs.push({role:'user',content:txt});
  const key=localStorage.getItem(AK)||'';
  if(!key||!key.startsWith('sk-ant')){
    botSay('Por ahora no puedo responder preguntas abiertas, pero un asesor humano puede ayudarte de inmediato por WhatsApp 📲',()=>setInput(true,'Escribe tu pregunta...'));
    return;
  }
  const t=document.createElement('div'); t.className='typing'; t.innerHTML='<i></i><i></i><i></i>'; chat.appendChild(t); scroll();
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:600,system:(settings.systemprompt||DEF_SETTINGS.systemprompt)+' Datos del cliente: '+JSON.stringify(answers),messages:freeMsgs.slice(-10)})
    });
    const data=await r.json(); t.remove();
    const out=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n')||'No pude generar respuesta, intenta de nuevo.';
    freeMsgs.push({role:'assistant',content:out});
    addMsg(out,'bot');
  }catch(e){
    t.remove();
    addMsg('Hubo un problema de conexión. Intenta de nuevo o escríbenos por WhatsApp 📲','bot');
  }
  setInput(true,'Escribe tu pregunta...');
}
